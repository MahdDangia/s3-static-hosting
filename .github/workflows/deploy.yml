name: Deploy Frontend to AWS S3

# Trigger this pipeline every time code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your latest code onto the GitHub runner machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Log into your AWS account using the repository secrets we saved
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # ◄ Make sure this matches your infrastructure region!

    # 3. Sync your frontend folder to your live S3 bucket
    - name: Deploy Frontend to S3
      run: |
        aws s3 sync Resume-S3/frontend s3://my-resume-website-ee763240 --delete
